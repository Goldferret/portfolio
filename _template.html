<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{entry_title}} — {{project_name}} — Gabriel Ferrer</title>
<meta name="description" content="{{entry_summary}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/portfolio/style.css">
<style>
/* Entry-specific styles */
.entry-header { padding-block: clamp(var(--space-12), 7vw, var(--space-20)); border-bottom: 1px solid var(--sand-divider); margin-bottom: var(--space-12); }
.entry-project { font-family: var(--font-mono); font-size: var(--text-xs); letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: var(--space-4); }
.entry-project a { color: var(--green); }
.entry-title { font-family: var(--font-serif); font-size: var(--text-2xl); font-weight: 400; color: var(--text); margin-bottom: var(--space-5); letter-spacing: -0.01em; }
.entry-meta { font-size: var(--text-sm); color: var(--text-faint); }
.entry-body { max-width: 68ch; }
.entry-body h2 { font-family: var(--font-serif); font-size: var(--text-lg); font-weight: 400; color: var(--text); margin-top: var(--space-12); margin-bottom: var(--space-4); }
.entry-body h3 { font-size: var(--text-base); font-weight: 500; color: var(--text); margin-top: var(--space-8); margin-bottom: var(--space-3); }
.entry-body p { margin-bottom: var(--space-5); color: var(--text-muted); line-height: 1.7; }
.entry-body ul, .entry-body ol { padding-left: var(--space-6); margin-bottom: var(--space-5); color: var(--text-muted); line-height: 1.7; }
.entry-body li { margin-bottom: var(--space-2); }
.entry-body pre { background: var(--cream-dark); border: 1px solid var(--sand-divider); padding: var(--space-5); overflow-x: auto; margin-bottom: var(--space-5); }
.entry-body code { font-family: var(--font-mono); font-size: 0.875em; }
.entry-body pre code { font-size: var(--text-sm); }
.entry-body figure { margin-block: var(--space-10); }
.entry-body figure img { border: 1px solid var(--sand-divider); background: #fff; max-width: 100%; }
.entry-body figcaption { font-size: var(--text-xs); color: var(--text-faint); margin-top: var(--space-3); line-height: 1.5; }
.entry-nav { display: flex; justify-content: space-between; margin-top: var(--space-16); padding-top: var(--space-8); border-top: 1px solid var(--sand-divider); font-size: var(--text-sm); }
</style>
</head>
<body>

<nav>
  <div class="container nav-inner">
    <a href="/" class="nav-name">Gabriel Ferrer</a>
    <ul class="nav-links">
      <li><a href="/#now">Now</a></li>
      <li><a href="/work/">Projects</a></li>
      <li><a href="/#publications">Publications</a></li>
      <li><a href="/#about">About</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<div class="container">

  <header class="entry-header">
    <p class="entry-project"><a href="/work/{{project_slug}}/">← {{project_name}}</a></p>
    <h1 class="entry-title">{{entry_title}}</h1>
    <p class="entry-meta">{{entry_date}}</p>
  </header>

  <article class="entry-body">
    {{entry_content}}
  </article>

  <nav class="entry-nav">
    <a href="/work/{{project_slug}}/" class="work-link" style="flex-direction: row-reverse; gap: var(--space-2);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(180deg)"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      All {{project_name}} entries
    </a>
  </nav>

</div>

<footer style="margin-top: var(--space-20);">
  <div class="container">
    <div class="footer-note">
      <span>© 2026 Gabriel Alexander Ferrer</span>
      <a href="/" class="footer-link">gabrielferrer — home</a>
    </div>
  </div>
</footer>

</body>
</html>
